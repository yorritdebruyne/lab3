# ============================================================
#  Profile: node
#  Run with:  java -jar lab.jar \
#               --spring.profiles.active=node \
#               --node.name=nodeA \
#               --node.ip=192.168.0.5
#
#  Change node.name, node.ip, server.port, and node.peer.port
#  per instance on the command line.
#  Everything else can stay the same across all nodes.
# ============================================================

server.port=8081

# This node's identity — override on the command line per instance
node.name=nodeA
node.ip=192.168.0.5

# Where the naming server is running
namingserver.url=http://localhost:8080

# Must match the naming server's multicast settings
multicast.group=230.0.0.0
multicast.port=4446

# Port that OTHER nodes use to reach us via REST (should match server.port)
node.peer.port=8081

# How often to ping neighbours (milliseconds)
ping.interval.ms=5000

# ============================================================
# Lab 5 — Replication settings
# ============================================================

# Folder where this node's own files live (you put files here manually for testing)
node.local.dir=local

# Folder where received replica files are stored (written by TcpFileServer)
node.replicas.dir=replicas

# Folder where FileLog JSON files are stored (written by FileLogService)
node.logs.dir=logs

# TCP port for file transfers — must be different from server.port
node.tcp.port=9000

# How often FolderWatcher polls the local/ folder for changes (milliseconds)
node.watch.interval.ms=5000